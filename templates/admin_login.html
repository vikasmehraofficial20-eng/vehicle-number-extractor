<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login &middot; Vehicle Number Extractor</title>
<style>
  :root {
    --ink: #14213d;
    --paper: #fbfaf7;
    --accent: #b8552e;
    --accent-deep: #8f3f1f;
    --line: #dedad2;
    --err: #a3271f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap {
    max-width: 380px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-deep);
    font-weight: 600;
    margin-bottom: 6px;
    text-align: center;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 24px;
    text-align: center;
  }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #5a5850;
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 16px;
    background: var(--paper);
    color: var(--ink);
  }
  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:active { background: var(--accent-deep); }
  .error {
    background: #fbe9e7;
    color: var(--err);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Audit Tool</div>
  <h1>Admin Login</h1>
  <div class="card">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Log In</button>
    </form>
  </div>
</div>
</body>
</html>
